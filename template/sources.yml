update_process:
  - Compare each source repository against its last reviewed SHA.
  - Identify potentially reusable improvements.
  - Classify changes as reusable infrastructure, reusable teaching convention, course-specific, or obsolete or experimental.
  - Incorporate only generally reusable improvements.
  - Update the recorded SHA.
notes:
  - Do not implement blind synchronization from a teaching repository into this template.
  - Replace unavailable SHA markers after a network-enabled local clone can record exact commits.
